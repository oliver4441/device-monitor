services:
  - type: web
    name: device-monitor-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DASHBOARD_PASSWORD
        value: admin123
      - key: PORT
        value: 3000
    plan: free
