services:
  - type: web
    name: nemo-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    plan: free
    envVars:
      - key: DASHBOARD_PASSWORD
        value: admin123
      - key: PORT
        value: 3000
      - key: NODE_VERSION
        value: 20

  - type: static_site
    name: nemo-dashboard
    buildCommand: cd dashboard && npm install && npm run build
    rootDir: dashboard
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://nemo-backend.onrender.com
