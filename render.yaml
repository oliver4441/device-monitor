services:
  - type: web
    name: nemo-backend
    env: node
    buildCommand: npm install && cd ../dashboard && npm install && npm run build && mkdir -p ../backend/public && cp -r dist/* ../backend/public/ && cd ../backend
    startCommand: node src/index.js
    rootDir: backend
    plan: free
    envVars:
      - key: DASHBOARD_PASSWORD
        value: admin123
      - key: PORT
        value: 3000
      - key: NODE_VERSION
        value: 20
