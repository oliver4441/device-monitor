name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build APK
        run: |
          cd app
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -50
        continue-on-error: true

      - name: Find APK files
        run: |
          echo "=== Looking for APK files ==="
          find app/build -name "*.apk" 2>/dev/null
          echo "=== APK output dir ==="
          ls -la app/build/outputs/apk/ 2>/dev/null || echo "No outputs/apk dir"
          ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "No release dir"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DeviceMonitor-APK
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: warn

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: DeviceMonitor Build #${{ github.run_number }}
          files: app/build/outputs/apk/**/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
