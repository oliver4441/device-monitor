name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-version: '34'
          build-tools-version: '34.0.0'
          platforms: 'android-34'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create local.properties
        run: echo "sdk.dir=${ANDROID_HOME}" > local.properties

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace 2>&1 | tail -80
        continue-on-error: true

      - name: Find APK files
        run: |
          echo "=== Looking for APK files ==="
          find . -name "*.apk" 2>/dev/null
          echo "=== Build outputs ==="
          ls -laR app/build/outputs/ 2>/dev/null || echo "No outputs dir"
          echo "=== Check SDK ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DeviceMonitor-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: DeviceMonitor Build #${{ github.run_number }}
          files: app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
